# Production compose overlay.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from the base (dev) compose:
#   - Builds the `prod` Dockerfile stage (no hot reload, no dev deps).
#   - Drops bind-mounts of local source into containers.
#   - Removes public DB/Redis ports.
#   - Drops dev-only `--reload`; runs uvicorn workers directly.
#
# Real secrets belong in .env — never commit it.

services:
  postgres:
    ports: []

  redis:
    ports: []

  backend:
    build:
      target: prod
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
        "--proxy-headers",
        "--forwarded-allow-ips=*",
      ]
    volumes:
      - uploads:/app/uploads
      - repos:/app/repos

  celery-worker:
    build:
      target: prod
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
      ]
    volumes:
      - uploads:/app/uploads
      - repos:/app/repos

  frontend:
    volumes: []
